<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Connexion — INTERNALIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#F3EBF6;font-family:'Ubuntu',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    input,button{border:none;outline:none;font-family:'Ubuntu',sans-serif}

    .lc-wrap{width:100%;max-width:400px;padding:1.5rem}
    .lc-brand{text-align:center;margin-bottom:1.5rem}
    .lc-brand-name{font-size:1.8rem;font-weight:700;color:#8C55AA;letter-spacing:-.02em}

    .lc-card{
      background:#fff;border-radius:1.5em;padding:2.5rem 2rem;
      box-shadow:0 11px 35px 2px rgba(0,0,0,.14);
    }
    .lc-title{
      color:#8C55AA;font-weight:700;font-size:23px;text-align:center;padding-top:10px;margin-bottom:1.5rem;
    }
    .lc-field{margin-bottom:1.5rem}
    .lc-field label{display:block;font-size:.8rem;font-weight:500;color:#8C55AA;margin-bottom:.4rem;text-align:center}
    .lc-field input{
      width:100%;padding:12px 20px;border-radius:20px;text-align:center;
      background:rgba(136,126,126,.04);border:2px solid rgba(0,0,0,.02);
      font-size:14px;font-weight:500;color:#263238;letter-spacing:1px;
      transition:border-color .2s,background .2s;
    }
    .lc-field input:focus{
      border-color:rgba(0,0,0,.18)!important;background:rgba(136,126,126,.08);
    }
    .lc-btn{
      display:block;cursor:pointer;border-radius:5em;color:#fff;
      background:linear-gradient(to right,#9C27B0,#E040FB);
      padding:12px 40px;font-size:14px;font-weight:500;
      box-shadow:0 0 20px 1px rgba(0,0,0,.04);
      transition:transform .15s,box-shadow .15s;
      margin:0 auto;min-width:160px;
    }
    .lc-btn:hover{box-shadow:0 0 25px 3px rgba(156,39,176,.25)}
    .lc-btn:active{transform:scale(.97)}
    .lc-error{
      display:none;margin:1rem auto 0;padding:10px 16px;border-radius:20px;
      background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.82rem;text-align:center;max-width:260px;
    }
    .lc-footer{text-align:center;font-size:.75rem;color:#E1BEE7;margin-top:1.5rem}
    .lc-footer a{color:#E1BEE7;text-decoration:none}
    .lc-footer a:hover{text-decoration:underline}
  </style>
</head>
<body>

<div class="lc-wrap">
  <div class="lc-brand"><div class="lc-brand-name">INTERNALIS</div></div>

  <div class="lc-card">
    <div class="lc-title">Connexion</div>
    <form id="loginForm">
      <div class="lc-field">
        <label for="login">Identifiant</label>
        <input type="text" id="login" placeholder="ex: admin" autocomplete="username"/>
      </div>
      <div class="lc-field">
        <label for="pw">Mot de passe</label>
        <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="lc-btn">Se connecter</button>
      <div id="loginError" class="lc-error">Identifiant ou mot de passe incorrect.</div>
      <div id="lockInfo" style="display:none;margin-top:.6rem;font-size:.8rem;color:#b45309;background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:.5rem .7rem;text-align:center">🔒 Session fermée après 15 min d'inactivité. Reconnectez-vous.</div>
    </form>
  </div>

  <div class="lc-footer">© INTERNALIS</div>
</div>

<script src="js/app.js"></script>
<script>
  initDefaults();
  if (Auth.getSession()) window.location.href = 'app.html';
  if (sessionStorage.getItem('ftr_lock_reason') === 'idle') {
    const li = document.getElementById('lockInfo'); if (li) li.style.display = 'block';
    sessionStorage.removeItem('ftr_lock_reason');
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const username = document.getElementById('login').value;
    const password = document.getElementById('pw').value;
    if (await Auth.login(username, password)) {
      window.location.href = 'app.html';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  ['login','pw'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('loginError').style.display = 'none';
    });
  });
</script>
</body>
</html>
