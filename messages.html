<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Messages — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .chat-wrap{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 140px);min-height:450px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:#fff}
    .chat-list{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-height:0}
    .chat-list-header{display:flex;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--border);gap:.5rem;background:#fff}
    .chat-list-header h3{margin:0;font-size:.85rem;font-weight:700;flex:1}
    .chat-list-search{padding:.5rem .75rem;border-bottom:1px solid var(--border)}
    .chat-list-search input{width:100%;padding:.35rem .65rem;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;outline:none;box-sizing:border-box}
    .chat-list-search input:focus{border-color:var(--blue)}
    .chat-convs{flex:1;overflow-y:auto;min-height:0}
    .chat-conv{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
    .chat-conv:hover{background:var(--b50)}
    .chat-conv.active{background:#e8f0fe}
    .chat-conv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#fff;flex-shrink:0}
    .chat-conv-info{flex:1;min-width:0}
    .chat-conv-name{font-weight:600;font-size:.82rem;display:flex;align-items:center;gap:.3rem}
    .chat-conv-preview{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .chat-conv-right{text-align:right;flex-shrink:0}
    .chat-conv-time{font-size:.65rem;color:var(--muted);white-space:nowrap}
    .chat-conv-badge{background:var(--blue);color:#fff;font-size:.6rem;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-top:2px;margin-left:auto;padding:0 4px;box-sizing:border-box}
    .chat-main{display:flex;flex-direction:column;background:#fff;min-height:0}
    .chat-main-header{display:flex;align-items:center;gap:.6rem;padding:.5rem .85rem;border-bottom:1px solid var(--border);background:#fff;min-height:48px}
    .chat-main-header .avatar{width:30px;height:30px;font-size:.7rem}
    .chat-main-header-info{flex:1;min-width:0}
    .chat-main-header-name{font-weight:600;font-size:.82rem}
    .chat-main-header-status{font-size:.68rem;color:var(--muted)}

    .chat-input{display:flex;gap:.5rem;align-items:flex-end;padding:.5rem .75rem;border-top:1px solid var(--border);background:#fff}
    .chat-input textarea{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:.45rem .75rem;font-size:.82rem;outline:none;resize:none;min-height:36px;font-family:inherit}
    .chat-input textarea:focus{border-color:var(--blue)}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:2rem}
    .chat-empty svg{width:40px;height:40px;opacity:.25;margin-bottom:.5rem}
    .chat-empty p{font-size:.85rem;margin:0}
    .chat-overlay{position:absolute;top:52px;left:8px;width:280px;max-height:360px;background:#fff;z-index:10;display:flex;flex-direction:column;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.2);border:1px solid var(--border);overflow:hidden}
    .chat-overlay-header{display:flex;align-items:center;gap:.5rem;padding:.6rem .85rem;border-bottom:1px solid var(--border)}
    .chat-overlay-header h3{margin:0;font-size:.85rem;font-weight:700;flex:1}
    .chat-overlay-search{padding:.4rem .75rem;border-bottom:1px solid var(--border)}
    .chat-overlay-search input{width:100%;padding:.35rem .65rem;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;outline:none;box-sizing:border-box}
    .chat-overlay-search input:focus{border-color:var(--blue)}
    .chat-overlay-list{flex:1;overflow-y:auto}
    .chat-overlay-user{display:flex;align-items:center;gap:.55rem;padding:.45rem .75rem;cursor:pointer;transition:background .08s}
    .chat-overlay-user:hover{background:var(--b50)}
    .chat-overlay-user .ck{width:20px;height:20px;border-radius:50%;border:2px solid #c7c7cc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
    .chat-overlay-user .ck.checked{background:var(--blue);border-color:var(--blue)}
    .chat-overlay-user .ck.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
    .chat-overlay-user .avatar{width:34px;height:34px;font-size:.72rem}
    .chat-overlay-user-info{flex:1;min-width:0}
    .chat-overlay-user-name{font-weight:600;font-size:.8rem}
    .chat-overlay-user-role{font-size:.68rem;color:var(--muted)}
    .chat-overlay-btn{padding:.5rem .75rem;border-top:1px solid var(--border)}
    .chat-overlay-btn button{width:100%}
    .btn-circle{width:30px;height:30px;border-radius:50%;border:none;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .btn-circle svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
    .chat-conv-del{opacity:0;transition:opacity .12s;width:20px;height:20px;border-radius:50%;border:none;background:#ff3b30;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;margin-left:2px}
    .chat-conv-del svg{width:10px;height:10px;stroke:currentColor;stroke-width:3;fill:none}
    .chat-conv:hover .chat-conv-del{opacity:1}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Messages</div></div>
      <div class="header-right"><span id="convCount" style="font-size:.8rem;color:var(--muted)"></span></div>
    </header>
    <main class="content" style="padding-bottom:0">
      <div class="chat-wrap" style="position:relative">
        <div class="chat-list">
          <div class="chat-list-header">
            <h3>Conversations</h3>
          </div>
          <div class="chat-list-search"><input type="text" id="convSearch" placeholder="Rechercher" oninput="renderConvs()"/></div>
          <div class="chat-convs" id="chatConvs"></div>
        </div>
        <div class="chat-main" id="chatMain">
          <div class="chat-main-header" id="chatMainHeader" style="display:none">
            <button class="btn-circle" id="addParticipantBtn" style="flex-shrink:0;display:none" onclick="openCompose(currentConvId)" title="Ajouter un participant"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <div class="avatar" id="chatMainAvatar" style="background:var(--blue)">?</div>
            <div class="chat-main-header-info">
              <div class="chat-main-header-name" id="chatMainName">—</div>
              <div class="chat-main-header-status" id="chatMainStatus">Conversation</div>
            </div>
          </div>
          <div class="chat-msgs" id="chatMsgs">
            <div class="chat-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <p>Messages</p>
            </div>
          </div>
          <div class="chat-input" id="chatInputBar">
            <div style="display:flex;flex-direction:column;flex:1;gap:.25rem">
              <div style="display:flex;gap:.25rem">
                <button class="btn btn-ghost btn-sm" style="font-size:.6rem;padding:1px 5px" onclick="aiAssistMessage('redaction')" title="Rédiger">✍</button>
                <button class="btn btn-ghost btn-sm" style="font-size:.6rem;padding:1px 5px" onclick="aiAssistMessage('correction')" title="Corriger">✓</button>
                <button class="btn btn-ghost btn-sm" style="font-size:.6rem;padding:1px 5px" onclick="aiAssistMessage('reformulation')" title="Reformuler">🏛</button>
              </div>
              <textarea id="chatInput" rows="1" placeholder="Message" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}" disabled style="width:100%;box-sizing:border-box"></textarea>
            </div>
            <button class="btn btn-primary btn-sm" onclick="sendChatMsg()" id="sendBtn" disabled>Envoyer</button>
          </div>
          <div class="chat-overlay-backdrop" id="composeBackdrop" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.15);z-index:9" onclick="closeCompose()"></div>
          <div class="chat-overlay" id="composeOverlay" style="display:none">
            <div class="chat-overlay-header">
              <button class="btn btn-ghost btn-sm" onclick="closeCompose()" style="font-size:.8rem">Annuler</button>
              <h3>Nouveau message</h3>
              <div style="width:50px"></div>
            </div>
            <div class="chat-overlay-search"><input type="text" id="composeSearch" placeholder="Rechercher" oninput="renderComposeUsers()"/></div>
            <div class="chat-overlay-list" id="composeList"></div>
            <div class="chat-overlay-btn"><button class="btn btn-primary" id="composeStartBtn" disabled onclick="startComposeConv()">Démarrer</button></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/messages.js"></script>
</body>
</html>
