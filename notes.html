<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notes rapides — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .notes-layout{display:grid;grid-template-columns:300px 1fr;gap:1rem;height:calc(100vh - var(--header-h) - 3rem);min-height:420px}
    /* Volet gauche */
    .notes-aside{background:#fff;border-radius:var(--r-lg);box-shadow:0 1px 4px rgba(15,43,74,.08);display:flex;flex-direction:column;overflow:hidden}
    .notes-aside-top{padding:.85rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.6rem}
    .notes-search{width:100%}
    .notes-list{flex:1;overflow-y:auto;padding:.5rem}
    .note-item{padding:.6rem .7rem;border-radius:var(--r-sm);cursor:pointer;border:1px solid transparent;transition:background .12s}
    .note-item:hover{background:var(--g50)}
    .note-item.active{background:#fef9ec;border-color:#fcd34d}
    .note-item-title{font-weight:650;font-size:.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .note-item-sub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .notes-empty-list{padding:1.5rem;text-align:center;color:var(--muted);font-size:.8rem}
    /* Éditeur droite */
    .notes-main{background:#fff;border-radius:var(--r-lg);box-shadow:0 1px 4px rgba(15,43,74,.08);display:flex;flex-direction:column;overflow:hidden}
    .notes-main-top{padding:.85rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem}
    #noteTitle{flex:1;border:none;outline:none;font-size:1.05rem;font-weight:700;color:var(--text);background:transparent}
    #noteBody{flex:1;border:none;outline:none;resize:none;padding:1rem;font-size:.92rem;line-height:1.7;color:var(--g700);font-family:inherit}
    .notes-saved{font-size:.72rem;color:#16a34a;min-width:80px;text-align:right}
    .notes-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:.5rem;text-align:center;padding:2rem}
    @media(max-width:760px){
      .notes-layout{grid-template-columns:1fr;height:auto}
      .notes-aside{max-height:40vh}
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">🗒️ Notes rapides</div></div>
      <div class="header-right">
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content">
      <div class="notes-layout">
        <!-- VOLET GAUCHE -->
        <aside class="notes-aside">
          <div class="notes-aside-top">
            <button class="btn btn-accent btn-sm" onclick="newNote()" style="gap:.4rem;justify-content:center">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nouvelle note
            </button>
            <input type="text" id="notesSearch" class="form-control notes-search" placeholder="Rechercher…" oninput="renderList()"/>
          </div>
          <div class="notes-list" id="notesList"></div>
        </aside>

        <!-- ÉDITEUR DROITE -->
        <section class="notes-main">
          <div class="notes-main-top" id="noteEditorTop" style="display:none">
            <input type="text" id="noteTitle" placeholder="Titre de la note" oninput="onEdit()"/>
            <span class="notes-saved" id="noteSaved"></span>
            <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteCurrentNote()" title="Supprimer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
          <textarea id="noteBody" placeholder="Écrivez votre note ici…" oninput="onEdit()" style="display:none"></textarea>
          <div class="notes-placeholder" id="notesPlaceholder">
            <div style="font-size:2.2rem">🗒️</div>
            <div style="font-weight:600">Sélectionnez une note à gauche</div>
            <div style="font-size:.82rem">ou créez-en une nouvelle. Vos notes sont personnelles et enregistrées automatiquement.</div>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script>
function notesKey() { const s = Auth.getSession(); return 'ftr_notes_' + (s ? s.userId : 'anon'); }
function getNotes() { try { return JSON.parse(localStorage.getItem(notesKey()) || '[]'); } catch (e) { return []; } }
function saveNotes(list) { localStorage.setItem(notesKey(), JSON.stringify(list)); }

let notes = [];
let currentNoteId = null;
let saveTimer = null;

// Migration de l'ancien mémo unique (ftr_memo_<userId>) vers la nouvelle liste
function migrateOldMemo() {
  const s = Auth.getSession();
  const oldKey = 'ftr_memo_' + (s ? s.userId : 'anon');
  const old = localStorage.getItem(oldKey);
  if (old && old.trim() && !getNotes().length) {
    saveNotes([{ id: genId(), title: 'Mes notes', body: old, updatedAt: new Date().toISOString() }]);
    localStorage.removeItem(oldKey);
  }
}

function notePreview(n) {
  const txt = (n.body || '').replace(/\n+/g, ' ').trim();
  return txt ? txt.slice(0, 60) : 'Note vide';
}

function renderList() {
  const q = (document.getElementById('notesSearch').value || '').trim().toLowerCase();
  const el = document.getElementById('notesList');
  let list = [...notes].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  if (q) list = list.filter(n => `${n.title||''} ${n.body||''}`.toLowerCase().includes(q));
  if (!list.length) {
    el.innerHTML = `<div class="notes-empty-list">${q ? 'Aucune note trouvée.' : 'Aucune note.<br>Cliquez sur « Nouvelle note ».'}</div>`;
    return;
  }
  el.innerHTML = list.map(n => `
    <div class="note-item ${String(n.id) === String(currentNoteId) ? 'active' : ''}" onclick="selectNote('${n.id}')">
      <div class="note-item-title">${escHtml(n.title || 'Sans titre')}</div>
      <div class="note-item-sub">${escHtml(notePreview(n))}</div>
      <div class="note-item-sub">${n.updatedAt ? formatDate(n.updatedAt.slice(0,10)) : ''}</div>
    </div>`).join('');
}

function showEditor(show) {
  document.getElementById('noteEditorTop').style.display = show ? '' : 'none';
  document.getElementById('noteBody').style.display = show ? '' : 'none';
  document.getElementById('notesPlaceholder').style.display = show ? 'none' : '';
}

function selectNote(id) {
  const n = notes.find(x => String(x.id) === String(id));
  if (!n) return;
  currentNoteId = n.id;
  document.getElementById('noteTitle').value = n.title || '';
  document.getElementById('noteBody').value = n.body || '';
  document.getElementById('noteSaved').textContent = '';
  showEditor(true);
  renderList();
}

function newNote() {
  const n = { id: genId(), title: '', body: '', updatedAt: new Date().toISOString() };
  notes.push(n);
  saveNotes(notes);
  selectNote(n.id);
  document.getElementById('noteTitle').focus();
}

function onEdit() {
  const n = notes.find(x => String(x.id) === String(currentNoteId));
  if (!n) return;
  n.title = document.getElementById('noteTitle').value;
  n.body = document.getElementById('noteBody').value;
  n.updatedAt = new Date().toISOString();
  clearTimeout(saveTimer);
  document.getElementById('noteSaved').textContent = '…';
  saveTimer = setTimeout(() => {
    saveNotes(notes);
    renderList();
    const el = document.getElementById('noteSaved');
    el.textContent = '✓ Enregistré';
    setTimeout(() => { el.textContent = ''; }, 1500);
  }, 400);
}

function deleteCurrentNote() {
  if (!currentNoteId) return;
  confirmDialog('Supprimer cette note ?', () => {
    notes = notes.filter(x => String(x.id) !== String(currentNoteId));
    saveNotes(notes);
    currentNoteId = null;
    showEditor(false);
    renderList();
    toast('Note supprimée', 'info');
  });
}

document.addEventListener('DOMContentLoaded', () => {
  migrateOldMemo();
  notes = getNotes();
  renderList();
  // Sélectionne automatiquement la note la plus récente
  if (notes.length) {
    const last = [...notes].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''))[0];
    selectNote(last.id);
  }
});
</script>
</body>
</html>
