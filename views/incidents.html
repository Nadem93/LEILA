<style>
.incident-card { background:var(--card-bg, #fff); border:1px solid var(--border); border-radius:var(--r); padding:1rem 1.25rem; display:flex; flex-direction:column; gap:.35rem; transition:box-shadow .15s; }
.incident-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); }
.incident-card .top { display:flex; align-items:flex-start; gap:.75rem; }
.incident-card .top .info { flex:1; min-width:0; }
.incident-card .top .info h3 { margin:0; font-size:.95rem; font-weight:600; color:var(--g800); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.incident-card .meta { display:flex; flex-wrap:wrap; gap:.5rem 1rem; font-size:.78rem; color:var(--muted); margin-top:.15rem; }
.incident-card .meta span { display:flex; align-items:center; gap:.3rem; }
.incident-card .desc { font-size:.82rem; color:var(--g600); line-height:1.5; margin-top:.1rem; }
.badge-incident { display:inline-flex; align-items:center; gap:.35rem; padding:.18rem .55rem; border-radius:100px; font-size:.7rem; font-weight:600; white-space:nowrap; }
.badge-incident.dangere { background:#fef2f2; color:#dc2626; }
.badge-incident.grave { background:#ffedd5; color:#c2410c; }
.badge-incident.moyen { background:#fefce8; color:#a16207; }
.badge-incident.leger { background:#f0fdf4; color:#16a34a; }
.badge-status { display:inline-flex; align-items:center; gap:.35rem; padding:.18rem .55rem; border-radius:100px; font-size:.7rem; font-weight:600; }
.badge-status.declare { background:#eff6ff; color:#2563eb; }
.badge-status.cours { background:#fef3c7; color:#d97706; }
.badge-status.valide { background:#f0fdf4; color:#16a34a; }
.badge-status.classe { background:#f3f4f6; color:#6b7280; }
.incident-type-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1rem; }
.incident-actions { display:flex; gap:.4rem; margin-top:.25rem; }
.incident-actions button { font-size:.75rem; padding:.25rem .6rem; }
.validation-tag { font-size:.72rem; color:var(--muted); margin-top:.15rem; }
.incident-count { font-size:.8rem; color:var(--muted); margin-bottom:1rem; }
</style>
<div class="header-right" style="display:contents">
  <button class="btn btn-accent btn-sm" onclick="openModal('modalIncident')">+ Déclarer un incident</button>
</div>
<main class="content">
  <div class="toolbar" style="margin-bottom:1.5rem">
    <div class="search-box">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchIncident" placeholder="Rechercher par résident…"/>
    </div>
    <select id="filterType" style="width:auto">
      <option value="">Tous les types</option><option value="chute">Chute</option><option value="agression">Agression</option><option value="fugue">Fugue / Absence inquiétante</option><option value="violence">Violence</option><option value="medical">Médical / Soins</option><option value="materiel">Dégât matériel</option><option value="accident">Accident</option><option value="autre">Autre</option>
    </select>
    <select id="filterGravite" style="width:auto">
      <option value="">Toutes les gravités</option><option value="leger">Léger</option><option value="moyen">Modéré</option><option value="grave">Grave</option><option value="critique">Critique</option>
    </select>
    <select id="filterStatut" style="width:auto">
      <option value="">Tous les statuts</option><option value="declare">Déclaré</option><option value="cours">En cours</option><option value="valide">Validé</option><option value="classe">Classé</option>
    </select>
  </div>
  <div class="incident-count" id="incidentCount"></div>
  <div id="incidentsList"></div>
</main>

<div class="modal-overlay" id="modalIncident">
  <div class="modal" style="max-width:560px">
    <div class="modal-header"><h3>Déclarer un incident</h3><button class="modal-close" onclick="closeModal('modalIncident')">&times;</button></div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.85rem">
      <div class="form-group"><label>Titre *</label><input type="text" id="fTitre" placeholder="Ex: Chute dans l'escalier" required/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group"><label>Type *</label><select id="fType"><option value="chute">Chute</option><option value="agression">Agression</option><option value="fugue">Fugue / Absence inquiétante</option><option value="violence">Violence</option><option value="medical">Médical / Soins</option><option value="materiel">Dégât matériel</option><option value="accident">Accident</option><option value="autre">Autre</option></select></div>
        <div class="form-group"><label>Gravité *</label><select id="fGravite"><option value="leger">Léger</option><option value="moyen">Modéré</option><option value="grave">Grave</option><option value="critique">Critique</option></select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group"><label>Date</label><input type="date" id="fDate"/></div>
        <div class="form-group"><label>Heure</label><input type="time" id="fHeure"/></div>
      </div>
      <div class="form-group"><label>Résident concerné (optionnel)</label><select id="fResident"><option value="">— Aucun —</option></select></div>
      <div class="form-group"><label>Lieu</label><input type="text" id="fLieu" placeholder="Ex: Salle commune, Chambre 12…"/></div>
      <div class="form-group"><label>Description *</label><textarea id="fDescription" rows="4" placeholder="Décrivez les circonstances…" required></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalIncident')">Annuler</button>
      <button class="btn btn-primary" onclick="saveIncident()">Déclarer</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalDetail">
  <div class="modal" style="max-width:540px">
    <div class="modal-header"><h3 id="detailTitle">Détail de l'incident</h3><button class="modal-close" onclick="closeModal('modalDetail')">&times;</button></div>
    <div class="modal-body" id="detailBody" style="display:flex;flex-direction:column;gap:.75rem;font-size:.875rem"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>
