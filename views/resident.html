<div class="header-right" style="display:contents">
  <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
  <button class="btn btn-accent btn-sm" id="btnEdit" onclick="togglePageEdit()">✎ Modifier</button>
</div>
<main class="content" id="residentContent"></main>
<script>
let currentResidentId = null;
let pageEditMode = false;

function getResident(id) {
  const residents = DB.get(DB.keys.residents) || [];
  return residents.find(x => x.id === (id || currentResidentId));
}

function canEditResident() {
  const session = Auth.getSession();
  return session && (session.role === 'admin' || session.role === 'moderator');
}

function loadResident() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('residentContent').innerHTML = '<div class="empty"><h3>Résident non trouvé</h3><p>Aucun ID fourni.</p><a href="residents.html" class="btn btn-accent">← Retour aux résidents</a></div>'; return; }
  currentResidentId = id;
  const r = getResident();
  if (!r) { document.getElementById('residentContent').innerHTML = '<div class="empty"><h3>Résident introuvable</h3><p>Ce résident n\'existe pas ou a été supprimé.</p><a href="residents.html" class="btn btn-accent">← Retour aux résidents</a></div>'; return; }
  document.getElementById('pageTitle').textContent = `${r.prenom||''} ${r.nom||''}`;
  if (pageEditMode) { renderEditMode(r); return; }
  renderViewMode(r);
}

function renderViewMode(r) {
  const objs = DB.get(DB.keys.objectives) || [];
  const resObjs = (r.objectifs || []).map(id => objs.find(o => String(o.id) === String(id))).filter(Boolean);
  const type = getStructureType();
  const genderLabel = r.genre==='M'?'Masculin':r.genre==='F'?'Féminin':'Autre';
  const todayPresences = (DB.get(DB.keys.presences)||{})[today()] || {};
  const presenceStatus = todayPresences[currentResidentId] || (r.statut === 'sorti' ? 'sorti' : r.statut);
  const cardColor = r.color||'#f7c59f';
  const photoEl = r.photo
    ? `<img src="${sanitizeUrl(r.photo)}" style="width:180px;height:180px;border-radius:20px;object-fit:cover;border:3px solid ${cardColor};box-shadow:0 0 20px ${cardColor}" alt=""/>`
    : `<div style="width:180px;height:180px;border-radius:20px;background:${cardColor};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:3.2rem;color:#fff;box-shadow:0 0 20px ${cardColor}">${initials(r.prenom,r.nom)}</div>`;
  const infoRow = (label, value) => value ? `<div><div style="font-size:.68rem;font-weight:700;color:rgba(0,0,0,.5);margin-bottom:2px">${label}</div><div style="font-weight:600;font-size:.85rem;color:#1e293b">${escHtml(value)}</div></div>` : '';
  const infoCard = (color, title, rows) => {
    const content = rows.filter(Boolean).join('');
    if (!content) return '';
    return `<div class="stat-card-glass" style="padding:1rem"><div class="card-body" style="display:flex;flex-direction:column;gap:.75rem"><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#${color}">${title}</div><div class="grid grid-2" style="gap:.75rem">${content}</div></div></div>`;
  };
  const isEnfant = type === 'enfants' || type === 'mixte';
  const isAdulte = type === 'adultes' || type === 'mixte';

  document.getElementById('residentContent').innerHTML = `
    <div style="background:rgba(255,255,255,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.5);border-radius:20px;padding:2rem 2rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.12)">
      ${photoEl}
      <div style="flex:1">
        <h1 style="font-size:1.8rem;font-weight:800;color:${cardColor};margin:0">${escHtml(r.prenom||'')} ${escHtml(r.nom||'')}</h1>
        <div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap">
          ${statusBadge(presenceStatus)}
          ${r.genre ? `<span class="badge" style="background:rgba(0,0,0,.08);color:rgba(0,0,0,.65)">${genderLabel}</span>` : ''}
          ${r.dob ? `<span class="badge" style="background:rgba(0,0,0,.08);color:rgba(0,0,0,.65)">${age(r.dob)} ans</span>` : ''}
        </div>
        ${r.referent ? `<div style="color:rgba(0,0,0,.6);font-size:.85rem;margin-top:.5rem">Référent : <strong style="color:#1e293b">${escHtml(r.referent)}</strong></div>` : ''}
      </div>
    </div>
    <div class="grid grid-4" style="margin-bottom:1.5rem">
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#3b82f625,#93c5fd15)"><div class="stat-card-top"><span class="stat-label">Naissance</span><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div></div><div class="stat-num">${r.dob ? formatDate(r.dob) : '—'}</div><div class="stat-change">${r.dob ? age(r.dob)+' ans' : ''}</div></div>
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#10b98125,#34d39915)"><div class="stat-card-top"><span class="stat-label">Entrée</span><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div></div><div class="stat-num">${r.entree ? formatDate(r.entree) : '—'}</div><div class="stat-change">Date d'admission</div></div>
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#e85d0425,#fb923c15)"><div class="stat-card-top"><span class="stat-label">Chambre</span><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div><div class="stat-num">${r.chambre||'—'}</div><div class="stat-change">Espace de vie</div></div>
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#8b5cf625,#a78bfa15)"><div class="stat-card-top"><span class="stat-label">Genre</span><div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div></div><div class="stat-num">${genderLabel}</div><div class="stat-change">${r.dob ? 'Né(e) le '+formatDate(r.dob) : ''}</div></div>
    </div>
    ${renderStatCards(r)}
    <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
      ${infoCard('0f2b4a', '👤 Identité', [
        infoRow('Nom', r.nom), infoRow('Prénom', r.prenom),
        infoRow('Genre', genderLabel), infoRow('Date de naissance', r.dob ? formatDate(r.dob)+' ('+age(r.dob)+' ans)' : ''),
        infoRow('N° Sécurité sociale', r.nss)
      ])}
      ${infoCard('d97706', '🏠 Séjour', [
        infoRow('Date d\'entrée', r.entree ? formatDate(r.entree) : ''),
        infoRow('Statut', r.statut), infoRow('Chambre / Unité', r.chambre),
        infoRow('Référent principal', r.referent)
      ])}
      ${infoCard('16a34a', '🏥 Médical', [
        infoRow('Médecin traitant', r.medecin), infoRow('Tél. médecin', r.medecinTel),
        infoRow('Allergies / Contre-indications', r.allergies)
      ])}
      ${isEnfant ? infoCard('8b5cf6', '🧒 Enfant', [
        infoRow('Tuteur légal', r.tuteur), infoRow('Tél. tuteur', r.tuteurTel),
        infoRow('Établissement scolaire', r.ecole), infoRow('Classe', r.classe),
        infoRow('Organisme', r.organisme), infoRow('N° dossier', r.dossier)
      ]) : ''}
      ${isAdulte ? infoCard('3b82f6', '👤 Adulte', [
        infoRow('Situation professionnelle', r.situationPro),
        infoRow('Ressources', r.ressources),
        infoRow('Organisme prescripteur', r.organismeA),
        infoRow('Situation administrative', r.situationAdmin),
        infoRow('Mesure de protection', PROTECTION_LABELS ? (PROTECTION_LABELS[r.protection] || r.protection) : r.protection)
      ]) : ''}
      ${resObjs.length ? infoCard('f59e0b', '🎯 Objectifs assignés ('+resObjs.length+')', resObjs.map(o => `<div style="grid-column:1/-1"><div style="padding:.6rem .85rem;background:rgba(0,0,0,.04);border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.08)"><div style="font-weight:600;font-size:.85rem;color:#1e293b">${escHtml(o.name)}</div>${o.description ? `<div style="font-size:.75rem;color:rgba(0,0,0,.5);margin-top:2px">${escHtml(o.description)}</div>` : ''}</div></div>`)) : ''}
      ${r.notes ? infoCard('6366f1', '📝 Notes', [`<div style="grid-column:1/-1"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0;color:#1e293b">${escHtml(r.notes)}</p></div>`]) : ''}
      ${r.contacts ? infoCard('6366f1', '📞 Contacts d\'urgence', [`<div style="grid-column:1/-1"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0;color:#1e293b">${escHtml(r.contacts)}</p></div>`]) : ''}
    </div>`;
}



function inputField(id, label, value, type) {
  return `<div class="form-group"><label>${label}</label><input type="${type||'text'}" id="${id}" value="${escHtml(value||'')}" class="form-input"/></div>`;
}

function selectField(id, label, value, options) {
  const opts = options.map(o => `<option value="${o[0]}"${value===o[0]?' selected':''}>${o[1]}</option>`).join('');
  return `<div class="form-group"><label>${label}</label><select id="${id}" class="form-input">${opts}</select></div>`;
}

function renderEditMode(r) {
  const type = getStructureType();
  const objs = DB.get(DB.keys.objectives) || [];
  const resObjIds = r.objectifs || [];
  document.getElementById('residentContent').innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header"><span class="card-title">✎ Modification — ${escHtml(r.prenom||'')} ${escHtml(r.nom||'')}</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:1rem">
        <div class="grid grid-3" style="gap:.75rem">
          ${inputField('ePrenom','Prénom',r.prenom)}
          ${inputField('eNom','Nom',r.nom)}
          ${selectField('eGenre','Genre',r.genre, [['','—'],['M','Masculin'],['F','Féminin'],['A','Autre']])}
        </div>
        <div class="grid grid-3" style="gap:.75rem">
          ${inputField('eDob','Date de naissance',r.dob,'date')}
          ${inputField('eEntree','Date d\'entrée',r.entree,'date')}
          ${inputField('eChambre','Chambre / Unité',r.chambre)}
        </div>
        <div class="grid grid-3" style="gap:.75rem">
          ${selectField('eStatut','Statut',r.statut, [['urgence','Urgence'],['stage','Stage'],['temporaire','Temporaire'],['permanent','Permanent']])}
          ${inputField('eReferent','Référent',r.referent)}
          ${inputField('eColor','Couleur',r.color||'#3b82f6','color')}
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.25rem">👤 Informations personnelles</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eMedecin','Médecin traitant',r.medecin)}
          ${inputField('eMedecinTel','Tél. médecin',r.medecinTel)}
          ${inputField('eAllergies','Allergies / CI',r.allergies)}
          ${inputField('eNss','N° Sécurité sociale',r.nss)}
        </div>
        ${(type==='enfants'||type==='mixte')?`
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8b5cf6;margin-bottom:.25rem">🧒 Enfant</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eTuteur','Tuteur légal',r.tuteur)}
          ${inputField('eTuteurTel','Tél. tuteur',r.tuteurTel)}
          ${inputField('eEcole','Établissement scolaire',r.ecole)}
          ${inputField('eClasse','Classe',r.classe)}
          ${inputField('eOrganisme','Organisme',r.organisme)}
          ${inputField('eDossier','N° dossier',r.dossier)}
        </div>`:''}
        ${(type==='adultes'||type==='mixte')?`
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#3b82f6;margin-bottom:.25rem">👤 Adulte</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${selectField('eSituationPro','Situation pro.',r.situationPro, [['','—'],['emploi','Emploi'],['chantier','Chantier éducatif'],['formation','Formation'],['stage','Stage'],['inactif','Inactif'],['retraite','Retraite'],['autre','Autre']])}
          ${selectField('eRessources','Ressources',r.ressources, [['','—'],['aaH','AAH'],['rsa','RSA'],['sans','Sans'],['autre','Autre']])}
          ${inputField('eOrganismeA','Organisme',r.organismeA)}
          ${inputField('eSituationAdmin','Situation admin.',r.situationAdmin)}
          ${selectField('eProtection','Mesure de protection',r.protection, [['','—'],['tutelle','Tutelle'],['curatelle','Curatelle'],['sauvegarde','Sauvegarde de justice'],['habilitation','Habilitation familiale'],['masp','MASP'],['autre','Autre']])}
        </div>`:''}
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#f59e0b;margin-bottom:.25rem">🎯 Objectifs</div>
        <div id="eObjectifsList" style="display:flex;flex-wrap:wrap;gap:.4rem">${objs.map(o => `<label class="checkbox-wrap" style="padding:.4rem .65rem;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:background var(--t);user-select:none"><input type="checkbox" name="pageObj" value="${o.id}"${resObjIds.includes(o.id)?' checked':''}> ${escHtml(o.name)}</label>`).join('')}</div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📝 Notes</div>
        <textarea id="eNotes" class="form-input" rows="4" style="resize:vertical">${escHtml(r.notes||'')}</textarea>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📞 Contacts d'urgence</div>
        <textarea id="eContacts" class="form-input" rows="3" style="resize:vertical">${escHtml(r.contacts||'')}</textarea>
      </div>
      <div class="card-footer" style="display:flex;gap:.75rem;justify-content:flex-end;padding:.75rem 1rem">
        <button class="btn btn-ghost" onclick="cancelPageEdit()">Annuler</button>
        <button class="btn btn-primary" onclick="savePageEdit()">💾 Enregistrer</button>
      </div>
    </div>`;
}

function savePageEdit() {
  const r = getResident();
  if (!r) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const checked = [...document.querySelectorAll('input[name="pageObj"]:checked')].map(el => el.value);
  const data = {
    ...r,
    prenom: g('ePrenom'), nom: g('eNom'), genre: g('eGenre'),
    dob: g('eDob'), entree: g('eEntree'), chambre: g('eChambre'),
    statut: g('eStatut'), referent: g('eReferent'), color: g('eColor') || '#3b82f6',
    medecin: g('eMedecin'), medecinTel: g('eMedecinTel'),
    allergies: g('eAllergies'), nss: g('eNss'),
    tuteur: g('eTuteur'), tuteurTel: g('eTuteurTel'), ecole: g('eEcole'),
    classe: g('eClasse'), organisme: g('eOrganisme'), dossier: g('eDossier'),
    situationPro: g('eSituationPro'), ressources: g('eRessources'),
    organismeA: g('eOrganismeA'), situationAdmin: g('eSituationAdmin'), protection: g('eProtection'),
    objectifs: checked,
    notes: g('eNotes'), contacts: g('eContacts'),
    updatedAt: new Date().toISOString()
  };
  const residents = DB.get(DB.keys.residents) || [];
  DB.set(DB.keys.residents, residents.map(x => x.id === currentResidentId ? data : x));
  toast('Résident mis à jour', 'success');
  pageEditMode = false;
  loadResident();
}

function cancelPageEdit() {
  pageEditMode = false;
  loadResident();
}

function togglePageEdit() {
  pageEditMode = !pageEditMode;
  loadResident();
}

function renderStatCards(r) {
  const presences = DB.get(DB.keys.presences) || {};
  const journal = DB.get(DB.keys.journal) || [];
  const planning = DB.get(DB.keys.planning) || [];
  const ppeList = DB.get(DB.keys.ppe) || [];
  const incidents = DB.get(DB.keys.incidents) || [];
  const categories = DB.get(DB.keys.categories) || [];
  const now = new Date();
  const todayStr = today();
  const monthStart = todayStr.slice(0,7)+'-01';
  let monthAbsences = 0, monthTotal = 0;
  for (const [d,day] of Object.entries(presences)) {
    if (d < monthStart) continue;
    const s = day[currentResidentId];
    if (s) { monthTotal++; if (s === 'absent') monthAbsences++; }
  }
  const rEvents = planning.filter(e => String(e.residentId) === String(currentResidentId) || e.residentName === `${r.prenom||''} ${r.nom||''}`);
  const upcomingEvents = rEvents.filter(e => { const start = new Date(e.date + 'T' + (e.time||'09:00')); return start.getTime() > now.getTime() - 3600000; }).sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||'')).slice(0,5);
  const rJournal = journal.filter(e => String(e.residentId) === String(currentResidentId) || e.resident === `${r.prenom||''} ${r.nom||''}`).slice(-5).reverse();
  const rIncidents = incidents.filter(e => String(e.residentId) === String(currentResidentId)).slice(-5).reverse();
  const rPpe = ppeList.filter(p => String(p.residentId) === String(currentResidentId) && p.statut !== 'termine');
  return `
    <div class="grid grid-3" style="margin-bottom:1.5rem">
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#ef444425,#fca5a515)"><div class="stat-card-top"><span class="stat-label">Absences (mois)</span><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div></div><div class="stat-num">${monthAbsences}</div><div class="stat-change">${monthTotal ? Math.round(monthAbsences/monthTotal*100)+'%' : '—'}</div></div>
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#ef444425,#fca5a515)"><div class="stat-card-top"><span class="stat-label">Événements à venir</span><div class="stat-icon" style="background:rgba(239,68,68,.2);color:#ef4444"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div><div class="stat-num">${upcomingEvents.length}</div><div class="stat-change">Sur le planning</div></div>
      <div class="stat-card-glass" style="background:linear-gradient(135deg,#16a34a25,#4ade8015)"><div class="stat-card-top"><span class="stat-label">Avenants actifs</span><div class="stat-icon" style="background:rgba(22,163,74,.2);color:#16a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg></div></div><div class="stat-num">${rPpe.length}</div><div class="stat-change">${rPpe.length ? (rPpe.filter(p=>p.statut==='actif').length)+' en cours' : 'Aucun'}</div></div>
    </div>`;
}

function initResidentPage() {
  if (typeof registerPageInit === 'function') {
    registerPageInit('resident', loadResident);
  } else {
    loadResident();
  }
}
initResidentPage();
</script>
