<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiche employé — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title" id="pageTitle">Fiche employé</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm btn-add-resident" onclick="history.back()">←<span class="btn-add-label"> Retour</span></button>
        <button class="btn btn-accent btn-sm btn-add-resident" id="btnEdit" onclick="togglePageEdit()">✎<span class="btn-add-label"> Modifier</span></button>
      </div>
    </header>
    <main class="content" id="employeContent"></main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script>
const EMP_DOCS_KEY = 'ftr_employes_docs';
const DOC_CAT_LABELS = {
  contrat:'Contrat', fiche:'Fiche de poste', administratif:'Administratif',
  formation:'Formation', sanction:'Sanction', autre:'Autre'
};

let currentEmployeId = null;
let pageEditMode = false;
let pageDocFile = null;

function docTypeIcon(mime) {
  if (!mime) return '📎';
  if (mime.includes('pdf')) return '📄';
  if (mime.includes('image')) return '🖼️';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  return '📎';
}

function fmtSize(b) {
  if (b < 1024) return b + ' o';
  if (b < 1024*1024) return Math.round(b/1024) + ' Ko';
  return (b/1024/1024).toFixed(1) + ' Mo';
}

function getEmploye(id) {
  const list = JSON.parse(localStorage.getItem(DB.keys.employes) || '[]');
  return list.find(x => x.id === (id || currentEmployeId));
}

function canEditEmploye() {
  const session = Auth.getSession();
  return session && (session.role === 'admin' || session.role === 'moderator');
}

function loadEmploye() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé non trouvé</h3><p>Aucun ID fourni.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  currentEmployeId = id;
  const e = getEmploye();
  if (!e) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé introuvable</h3><p>Cet employé n\'existe pas ou a été supprimé.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  document.getElementById('pageTitle').textContent = `${e.prenom||''} ${e.nom||''}`;
  const editBtn = document.getElementById('btnEdit');
  if (editBtn) {
    if (!canEditEmploye()) { editBtn.style.display = 'none'; }
    else { editBtn.style.display = ''; editBtn.textContent = pageEditMode ? '✕ Annuler' : '✎ Modifier'; }
  }
  if (pageEditMode) { renderEditMode(e); return; }
  renderViewMode(e);
}

function renderViewMode(e) {
  const docs = (JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}'))[currentEmployeId] || [];
  const initiales = ((e.prenom||'')[0]||'') + ((e.nom||'')[0]||'');
  const bannerColor = e.color || 'var(--primary)';
  const infoRow = (label, value) => value ? `<div><div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:2px">${label}</div><div style="font-weight:600;font-size:.85rem">${escHtml(value)}</div></div>` : '';
  const infoCard = (color, title, rows) => {
    const content = rows.filter(Boolean).join('');
    if (!content) return '';
    return `<div class="card" style="border-left:3px solid #${color}"><div class="card-body" style="display:flex;flex-direction:column;gap:.75rem"><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#${color}">${title}</div><div class="grid grid-2" style="gap:.75rem">${content}</div></div></div>`;
  };

  document.getElementById('employeContent').innerHTML = `
    <div style="background:linear-gradient(135deg,${bannerColor},${bannerColor}22);border-radius:var(--r);padding:2rem 2rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center">
      <div style="width:96px;height:96px;border-radius:12px;background:${bannerColor};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.8rem;color:#fff;box-shadow:var(--shadow-md)">${escHtml(initiales)}</div>
      <div style="flex:1">
        <h1 style="font-size:1.8rem;font-weight:800;color:#fff;margin:0;text-shadow:0 1px 3px rgba(0,0,0,.15)">${escHtml(e.prenom||'')} ${escHtml(e.nom||'')}</h1>
        <div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap">
          <span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${escHtml(e.poste||'Sans poste')}</span>
          <span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${e.statut === 'inactif' ? 'Inactif' : 'Actif'}</span>
        </div>
      </div>
    </div>
    <div class="grid grid-4" style="margin-bottom:1.5rem">
      <div class="stat-card" style="background:linear-gradient(135deg,#3b82f625,#93c5fd15)"><div class="stat-card-top"><span class="stat-label">Poste</span><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div></div><div class="stat-num">${escHtml(e.poste||'—')}</div><div class="stat-change">Fonction</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#10b98125,#34d39915)"><div class="stat-card-top"><span class="stat-label">Téléphone</span><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div></div><div class="stat-num">${escHtml(e.telephone||'—')}</div><div class="stat-change">Contact</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#e85d0425,#fb923c15)"><div class="stat-card-top"><span class="stat-label">Email</span><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div></div><div class="stat-num">${escHtml(e.email||'—')}</div><div class="stat-change">Adresse email</div></div>
      <div class="stat-card" style="background:linear-gradient(135deg,#8b5cf625,#a78bfa15)"><div class="stat-card-top"><span class="stat-label">Emb. le</span><div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div></div><div class="stat-num">${e.dateEmbauche ? formatDate(e.dateEmbauche) : '—'}</div><div class="stat-change">Date d'embauche</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
      ${infoCard('0f2b4a', '👤 Identité', [
        infoRow('Nom', e.nom), infoRow('Prénom', e.prenom),
        infoRow('Poste', e.poste), infoRow('Statut', e.statut === 'inactif' ? 'Inactif' : 'Actif')
      ])}
      ${infoCard('d97706', '📞 Contact', [
        infoRow('Téléphone', e.telephone), infoRow('Email', e.email)
      ])}
      ${e.notes ? infoCard('6366f1', '📝 Notes', [`<div style="grid-column:1/-1"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0">${escHtml(e.notes)}</p></div>`]) : ''}
    </div>
    <div class="tabs" style="margin-bottom:1rem">
      <button class="tab active" data-tab="documents">📎 Documents ${docs.length ? `<span class="badge badge-gray" style="margin-left:.3rem">${docs.length}</span>` : ''}</button>
    </div>
    <div id="tab-documents">${docsHtml(docs)}</div>`;

  initPageDocUpload();
}

function docsHtml(docs) {
  const list = docs.map(d => `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)">
    <span style="font-size:1.3rem">${docTypeIcon(d.mimeType)}</span>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.name)}</div>
      <div style="font-size:.72rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1px">
        <span>${DOC_CAT_LABELS[d.category]||d.category||'—'}</span>
        ${d.docDate ? `<span>📅 ${formatDate(d.docDate)}</span>` : ''}
        <span>· ${fmtSize(d.size)}</span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="downloadEmpDoc('${d.id}')">↓</button>
    <button class="btn btn-ghost btn-sm admin-only" style="color:var(--red)" onclick="deleteEmpDoc('${d.id}')">✕</button>
  </div>`).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">Fichiers joints</span></div><div class="card-body" style="padding:0">${docs.length ? list : '<div class="empty" style="padding:2rem"><p>Aucun document joint.</p></div>'}</div></div>
    <div class="card" style="margin-top:1rem">
      <div class="card-header"><span class="card-title">Ajouter un document</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.85rem">
        <div class="form-group"><label>Nom du document</label><input type="text" id="pageDocName" class="form-input" placeholder="ex: Contrat de travail"/></div>
        <div class="grid grid-2" style="gap:.75rem">
          <div class="form-group"><label>Date du document</label><input type="date" id="pageDocDate" class="form-input"/></div>
        </div>
        <div class="form-group"><label>Catégorie</label><select id="pageDocCategory" class="form-input"><option value="">—</option><option value="contrat">Contrat</option><option value="fiche">Fiche de poste</option><option value="administratif">Administratif</option><option value="formation">Formation</option><option value="sanction">Sanction</option><option value="autre">Autre</option></select></div>
        <div class="doc-upload-zone" onclick="document.getElementById('pageDocFileInput').click()" style="cursor:pointer;padding:1.5rem;text-align:center;border:2px dashed var(--border);border-radius:var(--r);background:var(--g50)">
          <div style="font-size:2rem;margin-bottom:.5rem">📎</div>
          <div style="font-weight:600;font-size:.875rem">Cliquez pour sélectionner un fichier</div>
          <div style="font-size:.78rem;color:var(--muted)">PDF, Word, image — max 3 Mo</div>
        </div>
        <input type="file" id="pageDocFileInput" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp"/>
        <div id="pageDocPending" style="display:none;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;gap:.75rem">
          <span style="font-size:1.2rem">📎</span>
          <div style="flex:1;min-width:0">
            <div id="pageDocPendingName" style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="pageDocPendingSize" style="font-size:.72rem;color:var(--muted)"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="cancelPageDoc()" style="color:var(--red)">✕</button>
        </div>
        <button class="btn btn-primary" onclick="uploadDocFromPage()" style="align-self:flex-end">Ajouter</button>
      </div>
    </div>`;
}

function inputField(id, label, value, type) {
  return `<div class="form-group"><label>${label}</label><input type="${type||'text'}" id="${id}" value="${escHtml(value||'')}" class="form-input"/></div>`;
}

function selectField(id, label, value, options) {
  const opts = options.map(o => `<option value="${o[0]}"${value===o[0]?' selected':''}>${o[1]}</option>`).join('');
  return `<div class="form-group"><label>${label}</label><select id="${id}" class="form-input">${opts}</select></div>`;
}

function renderEditMode(e) {
  document.getElementById('employeContent').innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header"><span class="card-title">✎ Modification — ${escHtml(e.prenom||'')} ${escHtml(e.nom||'')}</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:1rem">
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('ePrenom','Prénom',e.prenom)}
          ${inputField('eNom','Nom',e.nom)}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${selectField('ePoste','Poste',e.poste, getPosteOptions())}
          ${selectField('eStatut','Statut',e.statut, [['actif','Actif'],['inactif','Inactif']])}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eTel','Téléphone',e.telephone)}
          ${inputField('eEmail','Email',e.email)}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eDateEmbauche','Date d\'embauche',e.dateEmbauche,'date')}
          ${inputField('eColor','Couleur',e.color||'var(--primary)','color')}
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📝 Notes</div>
        <textarea id="eNotes" class="form-input" rows="4" style="resize:vertical">${escHtml(e.notes||'')}</textarea>
      </div>
      <div class="card-footer" style="display:flex;gap:.75rem;justify-content:flex-end;padding:.75rem 1rem">
        <button class="btn btn-ghost" onclick="cancelPageEdit()">Annuler</button>
        <button class="btn btn-primary" onclick="savePageEdit()">💾 Enregistrer</button>
      </div>
    </div>`;
}

function savePageEdit() {
  const e = getEmploye();
  if (!e) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const data = {
    ...e,
    prenom: g('ePrenom'), nom: g('eNom'), poste: g('ePoste'),
    telephone: g('eTel'), email: g('eEmail'),
    dateEmbauche: g('eDateEmbauche'), statut: g('eStatut'),
    color: g('eColor') || '#3b82f6',
    notes: g('eNotes'),
    updatedAt: new Date().toISOString()
  };
  let list = JSON.parse(localStorage.getItem(DB.keys.employes) || '[]');
  localStorage.setItem(DB.keys.employes, JSON.stringify(list.map(x => x.id === currentEmployeId ? data : x)));
  toast('Employé mis à jour', 'success');
  pageEditMode = false;
  loadEmploye();
}

function cancelPageEdit() {
  pageEditMode = false;
  loadEmploye();
}

function togglePageEdit() {
  pageEditMode = !pageEditMode;
  loadEmploye();
}

function initPageDocUpload() {
  const input = document.getElementById('pageDocFileInput');
  if (!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('Fichier trop lourd (max 3 Mo)', 'error'); return; }
    pageDocFile = file;
    document.getElementById('pageDocPendingName').textContent = file.name;
    document.getElementById('pageDocPendingSize').textContent = fmtSize(file.size);
    document.getElementById('pageDocPending').style.display = 'flex';
  });
}

async function uploadDocFromPage() {
  if (!pageDocFile || !currentEmployeId) return;
  const name = document.getElementById('pageDocName').value.trim() || pageDocFile.name.replace(/\.[^.]+$/, '');
  const docDate = document.getElementById('pageDocDate').value;
  const category = document.getElementById('pageDocCategory').value;
  try {
    const base64 = await fileToBase64(pageDocFile);
    const doc = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name,
      fileName: pageDocFile.name,
      size: pageDocFile.size,
      mimeType: pageDocFile.type,
      category,
      docDate,
      date: new Date().toISOString(),
      data: base64
    };
    const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
    if (!allDocs[currentEmployeId]) allDocs[currentEmployeId] = [];
    allDocs[currentEmployeId].push(doc);
    localStorage.setItem(EMP_DOCS_KEY, JSON.stringify(allDocs));
    toast('Document ajouté', 'success');
    pageDocFile = null;
    document.getElementById('pageDocName').value = '';
    document.getElementById('pageDocDate').value = '';
    document.getElementById('pageDocCategory').value = '';
    document.getElementById('pageDocFileInput').value = '';
    document.getElementById('pageDocPending').style.display = 'none';
    loadEmploye();
  } catch { toast('Erreur lors de l\'ajout', 'error'); }
}

function cancelPageDoc() {
  pageDocFile = null;
  document.getElementById('pageDocFileInput').value = '';
  document.getElementById('pageDocPending').style.display = 'none';
}

function downloadEmpDoc(docId) {
  const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
  const docs = allDocs[currentEmployeId] || [];
  const doc = docs.find(d => d.id === docId);
  if (!doc) return;
  const a = document.createElement('a');
  a.href = doc.data; a.download = doc.name; a.click();
}

function deleteEmpDoc(docId) {
  if (!confirm('Supprimer ce document ?')) return;
  const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
  if (!allDocs[currentEmployeId]) return;
  allDocs[currentEmployeId] = allDocs[currentEmployeId].filter(d => d.id !== docId);
  if (!allDocs[currentEmployeId].length) delete allDocs[currentEmployeId];
  localStorage.setItem(EMP_DOCS_KEY, JSON.stringify(allDocs));
  toast('Document supprimé', 'success');
  loadEmploye();
}

function initPageTabs() {
  document.querySelectorAll('#employeContent .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#employeContent .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('#employeContent > [id^="tab-"]').forEach(x => x.style.display = 'none');
      const tab = document.getElementById('tab-' + t.dataset.tab);
      if (tab) tab.style.display = '';
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  loadEmploye();
});
</script>
</body>
</html>
