<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Administration — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body {
      background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 100%);
      background-attachment:fixed;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:Inter,sans-serif;margin:0;
    }
    .am-wrap{width:100%;max-width:620px;padding:2rem 1.5rem}
    .am-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .am-title{font-size:1.4rem;font-weight:800;color:var(--av);letter-spacing:-.02em}
    .am-back{
      display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:var(--r-full);
      background:rgba(255,255,255,.8);border:1px solid rgba(15,43,74,.12);
      color:var(--muted);font-size:.8rem;font-weight:600;text-decoration:none;cursor:pointer;
      transition:all .18s;
    }
    .am-back:hover{background:#fff;color:var(--av);border-color:var(--av)}
    .am-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem;perspective:1000px}
    .am-card{
      position:relative;
      display:flex;flex-direction:column;align-items:center;gap:.45rem;
      padding:1.1rem .5rem;border-radius:var(--r-lg);
      background:#fff;
      border:1.5px solid rgba(148,163,184,.3);
      box-shadow:0 8px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
      text-decoration:none;color:var(--g700);
      font-size:.75rem;font-weight:600;text-align:center;
      transition:box-shadow .25s,transform .25s;cursor:pointer;
      will-change:transform;
    }
    .am-card:hover{
      box-shadow:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.08);
      transform:translateY(-6px) rotateX(4deg) rotateY(-2deg) scale(1.03);
      border-color:rgba(15,43,74,.3);
    }
    .am-card:hover::after{opacity:1}
    .am-card::after{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 50%,rgba(0,0,0,.04) 100%);
      opacity:0;transition:opacity .25s;pointer-events:none;
    }
    .am-icon{width:42px;height:42px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .am-icon svg{width:20px;height:20px;color:inherit}
    .am-label{line-height:1.2}

    @media(max-width:600px){
      .am-wrap{padding:1rem .75rem}
      .am-grid{grid-template-columns:repeat(3,1fr);gap:.625rem}
      .am-title{font-size:1.15rem}
      .am-card{padding:.75rem .2rem;font-size:.65rem}
      .am-icon{width:36px;height:36px}
      .am-icon svg{width:18px;height:18px}
    }
    @media(max-width:400px){
      .am-grid{grid-template-columns:repeat(2,1fr);gap:.5rem}
    }
  </style>
</head>
<body>
<div class="am-wrap">
  <div class="am-top">
    <div class="am-title">Administration</div>
    <a href="accueil.html" class="am-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
  </div>

  <div class="am-grid">
    <a href="admin.html?tab=stats" class="am-card" style="background:linear-gradient(135deg,#4f46e525,#818cf815)">
      <span class="am-icon" style="background:#4f46e520;color:#4f46e5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      Statistiques
    </a>
    <a href="admin.html?tab=etablissement" class="am-card" style="background:linear-gradient(135deg,#0891b225,#22d3ee15)">
      <span class="am-icon" style="background:#0891b220;color:#0891b2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>
      Établissement
    </a>
    <a href="admin.html?tab=fonctions" class="am-card" style="background:linear-gradient(135deg,#05966925,#34d39915)">
      <span class="am-icon" style="background:#05966920;color:#059669"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span>
      Fonctions
    </a>
    <a href="admin.html?tab=employes" class="am-card" style="background:linear-gradient(135deg,#d9770625,#fbbf2415)">
      <span class="am-icon" style="background:#d9770620;color:#d97706"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      Employés
    </a>
    <a href="admin.html?tab=educateurs" class="am-card" style="background:linear-gradient(135deg,#16a34a25,#4ade8015)">
      <span class="am-icon" style="background:#16a34a20;color:#16a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      Utilisateurs
    </a>
    <a href="admin.html?tab=permissions" class="am-card" style="background:linear-gradient(135deg,#8b5cf625,#a78bfa15)">
      <span class="am-icon" style="background:#8b5cf620;color:#8b5cf6"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      Permissions
    </a>
    <a href="admin.html?tab=compte" class="am-card" style="background:linear-gradient(135deg,#0284c725,#38bdf815)">
      <span class="am-icon" style="background:#0284c720;color:#0284c7"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      Mon compte
    </a>
    <a href="admin.html?tab=donnees" class="am-card" style="background:linear-gradient(135deg,#78716c25,#a8a29e15)">
      <span class="am-icon" style="background:#78716c20;color:#78716c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></span>
      Données
    </a>
  </div>

  <div style="text-align:center;margin-top:1.5rem">
    <a href="accueil.html" style="color:var(--muted);font-size:.78rem;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Retour à l'accueil
    </a>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  if (!Auth.isLoggedIn()) { location.href = 'index.html'; }
  if (!Auth.isAdmin()) { location.href = 'accueil.html'; }
</script>
</body>
</html>
