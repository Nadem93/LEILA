<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Planning</div></div>
      <div class="header-right">
        <div class="planning-view-switch" style="display:flex;gap:.4rem;background:var(--g100);border-radius:var(--r-sm);padding:3px">
          <button class="btn btn-sm" id="viewWeek" style="background:#fff;box-shadow:var(--shadow-sm)">Semaine</button>
          <button class="btn btn-ghost btn-sm" id="viewMonth">Mois</button>
          <button class="btn btn-ghost btn-sm" id="viewList">Liste</button>
        </div>
        <button class="btn btn-accent btn-add-resident" onclick="openModal('modalEvent')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvel événement</span>
        </button>
      </div>
    </header>

    <main class="content">
      <!-- Nav calendrier -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button class="btn btn-outline btn-sm" id="prevBtn">&#8592;</button>
        <h2 id="calTitle" style="font-size:1.1rem;font-weight:700;min-width:220px;text-align:center"></h2>
        <button class="btn btn-outline btn-sm" id="nextBtn">&#8594;</button>
        <button class="btn btn-ghost btn-sm" id="todayBtn">Aujourd'hui</button>
        <select id="filterEventResident" style="width:auto;margin-left:auto"><option value="">Tous les résidents</option></select>
      </div>

      <div id="calContainer"></div>

      <!-- Vue liste -->
      <div id="listContainer" style="display:none">
        <div class="table-wrap">
          <table><thead><tr><th>Titre</th><th>Résident</th><th>Date</th><th>Heure</th><th>Type</th><th>Actions</th></tr></thead>
          <tbody id="eventTableBody"></tbody></table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-overlay" id="modalEvent">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalEventTitle">Nouvel événement</span>
      <button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId"/>
      <div class="form-group"><label class="required">Titre</label><input type="text" id="evTitre" placeholder="Titre de l'événement"/></div>
      <div class="form-row">
        <div class="form-group"><label>Résident</label><select id="evResident"><option value="">Tous / Groupe</option></select></div>
        <div class="form-group"><label>Type</label><select id="evType"><option value="activite">Activité</option><option value="rdv">Rendez-vous</option><option value="sortie">Sortie</option><option value="reunion">Réunion</option><option value="avenant">Avenant</option><option value="projet">Projet personnalisé</option><option value="evaluation">Évaluation</option><option value="autre">Autre</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="required">Date</label><input type="date" id="evDate"/></div>
        <div class="form-group"><label>Heure de début</label><input type="time" id="evHeure" value="09:00"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durée</label><select id="evDuree"><option value="30">30 min</option><option value="60" selected>1h</option><option value="90">1h30</option><option value="120">2h</option><option value="180">3h</option><option value="journee">Journée</option></select></div>
        <div class="form-group"><label>Couleur</label><input type="color" id="evColor" value="#3b82f6"/></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="evDesc" rows="3" placeholder="Détails, lieu, intervenants…"></textarea></div>
      <div class="form-group" style="margin-top:.75rem">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:600;font-size:.85rem">
          <input type="checkbox" id="evVehiculeCheck" onchange="document.getElementById('evVehiculeFields').style.display=this.checked?'flex':'none'"/>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-3h8l2 3h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2M5 17a2 2 0 1 0 4 0M19 17a2 2 0 1 0-4 0"/></svg>
          Réserver un véhicule
        </label>
        <div id="evVehiculeFields" style="display:none;flex-direction:column;gap:.75rem;margin-top:.75rem;padding:.75rem;background:var(--g50);border-radius:var(--r)">
          <div class="form-group"><label class="required">Véhicule</label><input type="text" id="evVehicule" list="evVehiculeList" placeholder="Sélectionner un véhicule"/><datalist id="evVehiculeList"></datalist></div>
          <div class="form-row">
            <div class="form-group"><label class="required">Destination</label><input type="text" id="evDestination" placeholder="Lieu de destination"/></div>
            <div class="form-group"><label>Motif</label><input type="text" id="evMotif" placeholder="Objet du déplacement"/></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAllModals()">Annuler</button>
      <button class="btn btn-danger btn-sm" id="btnDeleteEvent" style="margin-right:auto;display:none" onclick="deleteEvent()">Supprimer</button>
      <button class="btn btn-primary" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/planning.js"></script>
</body>
</html>
