<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Génération icônes PWA</title></head>
<body>
<p>Génération des icônes en cours…</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.18;

  // Fond dégradé
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#0f2b4a');
  grad.addColorStop(1, '#1a3d6b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Lettre "I" stylisée
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s * 0.52}px 'Playfair Display', Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('I', s / 2, s / 2 + s * 0.03);

  // Point orange en bas à droite
  ctx.fillStyle = '#e85d04';
  ctx.beginPath();
  ctx.arc(s * 0.72, s * 0.72, s * 0.085, 0, Math.PI * 2);
  ctx.fill();
}

async function generate() {
  const sizes = [
    { id: 'c192', name: 'icon-192.png' },
    { id: 'c512', name: 'icon-512.png' }
  ];
  for (const { id, name } of sizes) {
    const canvas = document.getElementById(id);
    drawIcon(canvas);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.textContent = 'Télécharger ' + name;
    a.style.display = 'block';
    a.style.margin = '8px 0';
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
  }
  document.querySelector('p').textContent = '✅ Icônes générées — téléchargez-les et placez-les dans le dossier gestion-internat/.';
}
generate();
</script>
</body>
</html>
